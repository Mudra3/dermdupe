<!DOCTYPE html>
<html>
    <head>
        <title>DermDupe Results</title>
    <style>
        body { font-family: Arial, sans-serif; max-width:600px; margin: 50px auto;}
        .dupe { border: 1px solid #ddd; padding: 15 px; margin: 10px 0; border-radius: 5px;}
        .score { color: green; font-weight: bold; }
        a { color: green; font-weight: bold; }
        a { color:#4CAF50;  }
    </style>
    </head>
    <body> 
        <h1> DermDupe Results </h1>
        <a href="/">Search Again</a>
    <br><br>
    {% if dupes %}
        <h3>Found {{ dupes|length }} dupe(s)!</h3>
        {% for dupe in dupes %}
        <div class="dupe">
            <h3>{{ dupe.name }}</h3>
            <p class="score">Match: {{ dupe.score }}%</p>
        </div>
        {% endfor %}
    {% else %}
        <p>No dupes found. Try lowering the match threshold!</p>
    {% endif %}
</body>
</html>
